name: huanxi
description: "欢喜 (Huanxi) - 1v1付费音视频交友平台"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 网络请求
  dio: ^5.7.0
  web_socket_channel: ^3.0.1

  # 路由
  go_router: ^14.6.2

  # 本地存储
  shared_preferences: ^2.3.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Markdown 渲染
  flutter_markdown: ^0.7.4+2

  # 礼物动画
  svgaplayer_flutter: ^2.1.0

  # JSON 序列化
  json_annotation: ^4.9.0

  # 设备信息
  connectivity_plus: ^6.1.1
  package_info_plus: ^8.1.3
  device_info_plus: ^11.3.3

  # 通用工具
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.19.1

  # 腾讯 IM
  tencent_cloud_chat_sdk: ^8.9.7511+3
  flutter_secure_storage: ^10.0.0
  agora_rtc_engine: ^6.5.2
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
